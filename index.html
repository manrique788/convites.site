<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dominus Convites</title>

<style>
body {
  font-family: Arial;
  background: #0a0a0a;
  color: white;
  text-align: center;
}

.container {
  max-width: 400px;
  margin: auto;
  padding: 20px;
}

input, button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: none;
}

button {
  background: #00ff88;
  font-weight: bold;
  cursor: pointer;
}
</style>

</head>

<body>

<h1>Dominus Convites</h1>
<p>Convites digitais personalizados</p>

<div class="container">

<input id="nome" placeholder="Nome">
<input id="idade" placeholder="Idade">
<input id="tema" placeholder="Tema">

<button onclick="enviar()">Pedir pelo WhatsApp</button>

</div>

<script>
function enviar() {
  const nome = document.getElementById("nome").value;
  const idade = document.getElementById("idade").value;
  const tema = document.getElementById("tema").value;

  const mensagem = `Olá, quero um convite! Nome: ${nome}, Idade: ${idade}, Tema: ${tema}`;
  const url = `https://wa.me/5542988827801?text=${encodeURIComponent(mensagem)}`;

  window.open(url, '_blank');
}
</script>

</body>
</html>
