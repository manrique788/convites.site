<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dominus Convites</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

.topo {
  background: #ff4da6;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
  background: white;
  padding: 15px;
}

.imagem {
  width: 100%;
  border-radius: 10px;
}

.titulo {
  font-size: 20px;
  margin-top: 10px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.botao {
  width: 100%;
  padding: 12px;
  background: #ff4da6;
  color: white;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="topo">Dominus Convites</div>

<div class="container">

<img class="imagem" src="https://picsum.photos/500/300">

<div class="titulo">Convite Personalizado</div>

<input id="nome" placeholder="Nome do aniversariante">
<input id="idade" placeholder="Idade">
<input id="data" placeholder="Data da festa">

<button class="botao" onclick="enviar()">Pedir no WhatsApp</button>

</div>

<script>
function enviar() {
  let nome = document.getElementById("nome").value;
  let idade = document.getElementById("idade").value;
  let data = document.getElementById("data").value;

  let mensagem = "Olá, quero um convite! Nome: " + nome +
  ", Idade: " + idade +
  ", Data: " + data;

  let url = "https://wa.me/5542988827801?text=" + encodeURIComponent(mensagem);

  window.open(url, "_blank");
}
</script>

</body>
</html>
