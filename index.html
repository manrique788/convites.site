<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dominus Convites</title>

<style>
body {
  font-family: Arial;
  background: #0a0a0a;
  color: white;
  margin: 0;
}

.header {
  text-align: center;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
  padding: 20px;
}

.produto {
  background: #111;
  border-radius: 12px;
  padding: 15px;
}

.produto img {
  width: 100%;
  border-radius: 10px;
}

.titulo {
  font-size: 18px;
  margin-top: 10px;
}

.preco {
  color: #00ff88;
  margin: 5px 0;
}

input {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  background: #00ff88;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="header">
<h1>Dominus Convites</h1>
<p>Escolha seu convite e personalize</p>
</div>

<div class="grid">

<!-- PRODUTO 1 -->
<div class="produto">
<img src="https://picsum.photos/400/300?1">
<div class="titulo">Convite Tema Stitch</div>
<div class="preco">R$10,00</div>

<input id="nome1" placeholder="Nome">
<input id="idade1" placeholder="Idade">

<button onclick="enviar('Stitch', 'nome1', 'idade1')">Pedir no WhatsApp</button>
</div>

<!-- PRODUTO 2 -->
<div class="produto">
<img src="https://picsum.photos/400/300?2">
<div class="titulo">Convite Tema Barbie</div>
<div class="preco">R$10,00</div>

<input id="nome2" placeholder="Nome">
<input id="idade2" placeholder="Idade">

<button onclick="enviar('Barbie', 'nome2', 'idade2')">Pedir no WhatsApp</button>
</div>

<!-- PRODUTO 3 -->
<div class="produto">
<img src="https://picsum.photos/400/300?3">
<div class="titulo">Convite Tema Futebol</div>
<div class="preco">R$10,00</div>

<input id="nome3" placeholder="Nome">
<input id="idade3" placeholder="Idade">

<button onclick="enviar('Futebol', 'nome3', 'idade3')">Pedir no WhatsApp</button>
</div>

</div>

<script>
function enviar(tema, nomeId, idadeId) {
  let nome = document.getElementById(nomeId).value;
  let idade = document.getElementById(idadeId).value;

  let mensagem = "Olá, quero um convite! Tema: " + tema +
  ", Nome: " + nome +
  ", Idade: " + idade;

  let url = "https://wa.me/5542988827801?text=" + encodeURIComponent(mensagem);

  window.open(url, "_blank");
}
</script>

</body>
</html>
