<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dominus Convites</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

.topo {
  background: #ff4da6;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 10px;
}

.item {
  background: white;
  margin: 10px 0;
  padding: 15px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.nome {
  font-size: 14px;
}

.botao {
  background: #00cc66;
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="topo">Dominus Convites</div>

<div class="container">

<div class="item">
<div class="nome">Convite Stitch Aniversariante</div>
<button class="botao" onclick="enviar('Stitch Aniversariante')">Pedir</button>
</div>

<div class="item">
<div class="nome">Convite Lilo e Stitch Infantil</div>
<button class="botao" onclick="enviar('Lilo e Stitch Infantil')">Pedir</button>
</div>

<div class="item">
<div class="nome">Convite Minecraft</div>
<button class="botao" onclick="enviar('Minecraft')">Pedir</button>
</div>

<div class="item">
<div class="nome">Convite Homem Aranha Herói</div>
<button class="botao" onclick="enviar('Homem Aranha')">Pedir</button>
</div>

<div class="item">
<div class="nome">Convite Sonic</div>
<button class="botao" onclick="enviar('Sonic')">Pedir</button>
</div>

<div class="item">
<div class="nome">Convite Bolofofos</div>
<button class="botao" onclick="enviar('Bolofofos')">Pedir</button>
</div>

</div>

<script>
function enviar(tema) {
  let mensagem = "Olá, quero um convite: " + tema;

  let url = "https://wa.me/5542988827801?text=" + encodeURIComponent(mensagem);

  window.open(url, "_blank");
}
</script>

</body>
</html>
