<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dominus Convites</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0a0a0a;
  color: white;
  margin: 0;
  text-align: center;
}

h1 {
  margin-top: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: #111;
  border-radius: 12px;
  padding: 10px;
}

.card img {
  width: 100%;
  border-radius: 10px;
  height: 140px;
  object-fit: cover;
}

button {
  background: #00ff88;
  border: none;
  padding: 10px;
  width: 100%;
  margin-top: 8px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

.container {
  max-width: 400px;
  margin: auto;
  padding: 20px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: none;
}
</style>
</head>

<body>

<h1>Dominus Convites</h1>
<p>Escolha seu convite</p>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1608889175123-8ee362201f81">
<p>Homem-Aranha</p>
<button onclick="selecionar('Homem-Aranha')">Escolher</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1603575448878-868a20723f5d">
<p>Princesa</p>
<button onclick="selecionar('Princesa')">Escolher</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1579952363873-27f3bade9f55">
<p>Futebol</p>
<button onclick="selecionar('Futebol')">Escolher</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1611605698335-8b1569810432">
<p>Free Fire</p>
<button onclick="selecionar('Free Fire')">Escolher</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1585386959984-a41552231658">
<p>Barbie</p>
<button onclick="selecionar('Barbie')">Escolher</button>
</div>

</div>

<div class="container">
<h2>Personalizar</h2>

<input id="nome" placeholder="Nome">
<input id="idade" placeholder="Idade">
<input id="tema" placeholder="Tema">

<button onclick="enviar()">Pedir pelo WhatsApp</button>
</div>

<script>
function selecionar(tema) {
  document.getElementById("tema").value = tema;
}

function enviar() {
  let nome = document.getElementById("nome").value;
  let idade = document.getElementById("idade").value;
  let tema = document.getElementById("tema").value;

  let mensagem = "Olá, quero um convite! Nome: " + nome + ", Idade: " + idade + ", Tema: " + tema;

  let url = "https://wa.me/5542988827801?text=" + encodeURIComponent(mensagem);

  window.open(url, "_blank");
}
</script>

</body>
</html>
