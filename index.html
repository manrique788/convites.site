<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dominus Convites</title>

<style>
body {
  font-family: Arial;
  background: #0a0a0a;
  color: white;
  text-align: center;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: #111;
  border-radius: 12px;
  padding: 10px;
}

.card img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  border-radius: 10px;
}

button {
  background: #00ff88;
  border: none;
  padding: 10px;
  width: 100%;
  margin-top: 8px;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

.container {
  max-width: 400px;
  margin: auto;
  padding: 20px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: none;
}
</style>
</head>

<body>

<h1>Dominus Convites</h1>
<p>Escolha seu tema</p>

<div class="grid">

<div class="card">
<img src="https://cdn.pixabay.com/photo/2020/05/06/18/43/superhero-5139106_1280.png">
<p>Super-herói</p>
<button onclick="selecionar('Super-herói')">Escolher</button>
</div>

<div class="card">
<img src="https://cdn.pixabay.com/photo/2017/01/31/21/23/princess-2020597_1280.png">
<p>Princesa</p>
<button onclick="selecionar('Princesa')">Escolher</button>
</div>

<div class="card">
<img src="https://cdn.pixabay.com/photo/2016/11/29/09/08/soccer-1867469_1280.jpg">
<p>Futebol</p>
<button onclick="selecionar('Futebol')">Escolher</button>
</div>

<div class="card">
<img src="https://cdn.pixabay.com/photo/2020/06/20/21/29/game-5325603_1280.png">
<p>Games</p>
<button onclick="selecionar('Games')">Escolher</button>
</div>

<div class="card">
<img src="https://cdn.pixabay.com/photo/2021/01/11/12/59/unicorn-5906510_1280.png">
<p>Unicórnio</p>
<button onclick="selecionar('Unicórnio')">Escolher</button>
</div>

</div>

<div class="container">
<h2>Personalizar</h2>

<input id="nome" placeholder="Nome">
<input id="idade" placeholder="Idade">
<input id="tema" placeholder="Tema">

<button onclick="enviar()">Pedir pelo WhatsApp</button>
</div>

<script>
function selecionar(tema) {
  document.getElementById("tema").value = tema;
}

function enviar() {
  let nome = document.getElementById("nome").value;
  let idade = document.getElementById("idade").value;
  let tema = document.getElementById("tema").value;

  let mensagem = "Olá, quero um convite! Nome: " + nome + ", Idade: " + idade + ", Tema: " + tema;

  let url = "https://wa.me/5542988827801?text=" + encodeURIComponent(mensagem);

  window.open(url, "_blank");
}
</script>

</body>
</html>
